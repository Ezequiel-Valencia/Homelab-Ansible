---

profile: safety

exclude_paths:
  - "System Provision"
  - "roles/installations/home_assistant/files/ha_configuration.yaml"
  - "roles/installations/infra_install/handlers/main.yml"

enable_list:
  - args
  - avoid-implicit
  - empty-string-compare
  - fqcn
  - ignore-errors # make sure not all errors are ignored
  - internal-error
  - jinja # ensures jinja works
  - no-log-password # ensure that loops do not log any sensitive data
  - risky-file-permissions
  - risky-shell-pipe
