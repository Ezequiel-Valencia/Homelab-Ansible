mqtt:
  host: mosquitto

go2rtc:
  streams:
    front_doorbell_main:
      - rtsp://frigate:{FRIGATE_REOLINK_PASSWORD}@{FRIGATE_FRONT_PORCH_DOORBELL_IP}:554//h264Preview_01_main
    front_doorbell_sub:
      - rtsp://frigate:{FRIGATE_REOLINK_PASSWORD}@{FRIGATE_FRONT_PORCH_DOORBELL_IP}:554//h264Preview_01_sub

cameras:
  reolink_front:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/front_doorbell_main
          roles: [record]
        - path: rtsp://127.0.0.1:8554/front_doorbell_sub
          roles: [detect]
    detect:
      enabled: true
      width: 896
      height: 512
      fps: 5
    objects:
      track: [person, dog, cat]
    record:
      enabled: true
    snapshots:
      enabled: true

# https://corelab.tech/setupfrigate/


  # ── Frigate NVR (optional — for AI object detection with ReoLink) ───────────
  # Frigate is a powerful NVR that pulls your ReoLink RTSP stream and runs
  # real-time object detection (people, cars, animals) using a local ML model.
  # It integrates natively with Home Assistant via the Frigate HA integration.
  #
  # RTSP URL format for most ReoLink cameras:
  #   Main stream (HD): rtsp://admin:PASSWORD@CAMERA_IP:554//h264Preview_01_main
  #   Sub stream (SD):  rtsp://admin:PASSWORD@CAMERA_IP:554//h264Preview_01_sub
  #
  # To enable Coral TPU (USB) for faster inference, uncomment the device below.
  # To enable GPU inference, add the appropriate runtime/devices for your GPU.
  #
  # Comment out this entire service if you only want the native Reolink integration
  # in HA (which is simpler and still gives you live streams + motion sensors).
