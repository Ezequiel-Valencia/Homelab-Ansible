---

- name: Traefik Setup
  ansible.builtin.include_tasks: traefik-setup.yml

- name: PG-Admin Setup
  ansible.builtin.include_tasks: pg-admin.yml

- name: Install DB Clients
  become: true
  ansible.builtin.apt:
    pkg:
      - postgresql-client
      - mariadb-client
    state: present

- name: Create DB Resource
  vars:
    docker_template_files: []
    source_compose_file: db.compose.yml
    remote_compose_file: db.compose.yml
    compose_project_name: db
  ansible.builtin.include_tasks: ../tasks/docker-compose-up.yml
