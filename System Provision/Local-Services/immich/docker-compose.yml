name: immich

services:

  # -------------------------------------------------------
  # Traefik — Reverse Proxy
  # -------------------------------------------------------
  immich-traefik:
    image: traefik:3.6.1
    container_name: immich-traefik
    restart: unless-stopped
    env_file:
      - path: ./env_file
        required: true
    command:
      # API / dashboard (accessible at traefik.homelab.ezequielvalencia.com)
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=immich-traefik"

      # Entrypoints — port 80 redirects to 443 automatically
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # Let's Encrypt via Cloudflare DNS challenge
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnsChallenge.propagation.delayBeforeChecks=30s"
      - "--certificatesresolvers.letsencrypt.acme.dnsChallenge.propagation.disableChecks=true"

      - "--log.level=INFO"
    ports:
      - "9000:443"
    # environment:
      # - CF_API_EMAIL=${CF_API_EMAIL}
      # - CF_DNS_API_TOKEN=${CF_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - immich-traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.homelab.ezequielvalencia.com`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

  # -------------------------------------------------------
  # Immich — Server
  # -------------------------------------------------------
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich_server
    restart: unless-stopped
    env_file:
      - path: ./env_file
        required: true
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_USERNAME=immich
      - DB_DATBASE_NAME=immich
      # - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOSTNAME=immich-redis
    volumes:
      - ./uploads:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ../syncthing/data1/archive-photos:/external/archive-photos:ro
      - ../syncthing/data1/phone-photos:/external/phone-photos:ro
    depends_on:
      - redis
      - database
    networks:
      - immich-internal
      - immich-traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=immich-traefik"

      # HTTPS router
      - "traefik.http.routers.immich.rule=Host(`immich.homelab.ezequielvalencia.com`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.routers.immich.tls.certresolver=letsencrypt"
      - "traefik.http.routers.immich.middlewares=immich-buffering"

      # Service port
      - "traefik.http.services.immich.loadbalancer.server.port=2283"

      # Disable body size limit for large photo/video uploads
      - "traefik.http.middlewares.immich-buffering.buffering.maxRequestBodyBytes=0"
      - "traefik.http.middlewares.immich-buffering.buffering.memRequestBodyBytes=0"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M


  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    volumes:
      - ./ml-cache:/cache
    networks:
      - immich-internal
      - immich-traefik
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    image: docker.io/valkey/valkey:9
    container_name: immich-redis
    hostname: immich-redis
    restart: unless-stopped
    networks:
      - immich-internal

  # -------------------------------------------------------
  # Postgres (with pgvecto-rs for Immich vector search)
  # -------------------------------------------------------
  database:
    image: ghcr.io/immich-app/postgres:18-vectorchord0.5.3-pgvector0.8.1
    container_name: immich-postgres
    hostname: immich-postgres
    restart: unless-stopped
    env_file:
      - path: ./env_file
        required: true
    environment:
      # POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: immich
      POSTGRES_DB: immich
    volumes:
      - ./database:/var/lib/postgresql
    networks:
      - immich-internal

networks:
  # Traefik-facing — only services needing a public route join this
  immich-traefik:
    driver: bridge
    name: immich-traefik
  # Internal-only — Postgres and Redis are never reachable from outside
  immich-internal:
    internal: true
    name: immich-internal