services:
  #################
  # --- Music --- #
  #################

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    hostname: navidrome
    networks:
      - navidrome-internal    # Internal only — not reachable from Traefik directly
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h          # How often to scan for new music
      ND_LOGLEVEL: info             # Log level: error, warn, info, debug
      ND_SESSIONTIMEOUT: 24h        # Web session timeout
      ND_BASEURL: ""                # Base URL if running behind a reverse proxy (e.g. /navidrome)
      # Reverse proxy authentication — trust the username header set by the Authentik outpost.
      # Only requests from the navidrome-internal Docker network (172.x.x.x) are trusted.
      ND_EXTAUTH_USERHEADER: "X-Authentik-Username"
      ND_EXTAUTH_TRUSTEDSOURCES: "172.0.0.0/8"
      # ND_LASTFM_APIKEY: ""        # Last.fm API key for scrobbling / metadata
      # ND_LASTFM_SECRET: ""        # Last.fm API secret
      # ND_SPOTIFY_ID: ""           # Spotify client ID for artist images
      # ND_SPOTIFY_SECRET: ""       # Spotify client secret
    volumes:
      - "./data:/data"              # Navidrome database and cache
      - "../syncthing/data1/music:/music:ro"  # Your music library (read-only)

  ##################################
  # --- Authentik Proxy Outpost --- #
  ##################################

  authentik-proxy:
    image: ghcr.io/goauthentik/proxy:2026.2.2
    container_name: authentik-proxy-navidrome
    hostname: authentik-proxy-navidrome
    restart: unless-stopped
    networks:
      - ext-traefik        # Receives inbound traffic from Traefik
      - navidrome-internal # Forwards authenticated requests to Navidrome
    env_file:
      - path: ./authentik.env
        required: true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ext-traefik"

      # HTTPS router (takes over the navidrome hostname from Traefik's perspective)
      - "traefik.http.routers.navidrome.rule=Host(`navidrome.homelab.ezequielvalencia.com`)"
      - "traefik.http.routers.navidrome.entrypoints=websecure"
      - "traefik.http.routers.navidrome.tls=true"
      - "traefik.http.routers.navidrome.tls.certresolver=letsencrypt"

      # The outpost listens on 9000 (HTTP) — Traefik handles TLS termination
      - "traefik.http.services.navidrome.loadbalancer.server.port=9000"

networks:
  ext-traefik:
    external: true
    name: ext-traefik

  navidrome-internal:
    internal: true          # Docker blocks all external routing on this network
    name: navidrome-internal
